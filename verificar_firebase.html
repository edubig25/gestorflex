<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verificar Firebase</title><style>body{background:#09090e;color:#fff;font-family:Arial;padding:24px}button,input{padding:12px;margin:6px;border-radius:8px;border:1px solid #7c3aed;background:#111;color:#fff}.box{border:1px solid #7c3aed;border-radius:12px;padding:18px;max-width:680px}pre{white-space:pre-wrap;background:#050508;padding:12px;border-radius:8px;color:#00e6a8}</style></head><body><div class="box"><h1>Verificar Firebase — Gestor Flex</h1><p>Use para confirmar se o próprio navegador consegue ler clientes/planos no Firestore.</p><input id="email" type="email" placeholder="email"><input id="senha" type="password" placeholder="senha"><button onclick="login()">Login</button><button onclick="verificar()">Verificar dados</button><pre id="log">Aguardando...</pre></div><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script><script>const firebaseConfig={apiKey:"AIzaSyCHLr5xQGqGckcLESs5I5R7nsOcqK0ZhMo",authDomain:"gestor-flex-app.firebaseapp.com",projectId:"gestor-flex-app",storageBucket:"gestor-flex-app.firebasestorage.app",messagingSenderId:"481092517076",appId:"1:481092517076:web:0944fb99e65f2e86eb0f41"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore(),auth=firebase.auth();function log(t){document.getElementById('log').textContent+=t+'\n'}async function login(){document.getElementById('log').textContent='';try{await auth.signInWithEmailAndPassword(email.value,senha.value);log('✅ Login OK: '+auth.currentUser.email)}catch(e){log('❌ Login erro: '+e.message)}}async function count(col){const s=await db.collection(col).get();return s.size}async function verificar(){document.getElementById('log').textContent='';try{log('Usuário: '+(auth.currentUser?.email||'não logado'));for(const c of ['usuarios','clientes','planos','pagamentos']) log(c+': '+await count(c)+' registros lidos');log('✅ Verificação finalizada')}catch(e){log('❌ Erro ao ler Firestore: '+e.message);log('Código: '+(e.code||''));}}</script></body></html>
